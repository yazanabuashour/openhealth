name: Pull request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

jobs:
  policy-checks:
    name: Policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Verify required repository files
        run: |
          required_files=(
            README.md
            CONTRIBUTING.md
            SECURITY.md
            CODE_OF_CONDUCT.md
            .github/CODEOWNERS
            .github/PULL_REQUEST_TEMPLATE.md
            .github/dependabot.yml
            .github/workflows/pull-request.yml
            .github/workflows/release.yml
            scripts/validate-agent-skill.sh
            skills/openhealth/SKILL.md
          )

          for file in "${required_files[@]}"; do
            test -f "${file}"
          done

      - name: Reject machine-absolute paths in docs
        run: |
          if grep -RInE '/Users/|/home/|[A-Za-z]:\\\\' \
            README.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            docs \
            .github/ISSUE_TEMPLATE \
            .github/PULL_REQUEST_TEMPLATE.md; then
            echo "Remove machine-absolute filesystem paths from committed docs."
            exit 1
          fi

      - name: Validate Agent Skill
        run: ./scripts/validate-agent-skill.sh skills/openhealth

  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Check generated storage code is current
        run: |
          go generate ./...
          git diff --exit-code

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: v2.11.4

      - name: Run tests
        run: go test ./...

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
