name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify-release:
    name: Verify release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Check generated storage code is current
        run: |
          go generate ./...
          git diff --exit-code

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Validate Agent Skill
        run: ./scripts/validate-agent-skill.sh skills/openhealth

      - name: Run tests
        run: go test ./...

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - verify-release
    environment:
      name: release
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod

      - name: Prepare release metadata
        id: meta
        run: |
          mkdir -p dist
          version="${GITHUB_REF_NAME#v}"
          archive="openhealth_${version}_source.tar.gz"
          skill="openhealth_${version}_skill.tar.gz"
          checksum="openhealth_${version}_checksums.txt"
          sbom="openhealth_${version}_sbom.spdx.json"
          installer="install.sh"

          {
            echo "archive=${archive}"
            echo "skill=${skill}"
            echo "checksum=${checksum}"
            echo "sbom=${sbom}"
            echo "installer=${installer}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: dist/${{ steps.meta.outputs.sbom }}
          artifact-name: ${{ steps.meta.outputs.sbom }}

      - name: Build binary and skill archives
        run: |
          version="${GITHUB_REF_NAME#v}"
          targets=(
            "darwin/arm64"
            "darwin/amd64"
            "linux/amd64"
            "linux/arm64"
          )

          for target in "${targets[@]}"; do
            IFS=/ read -r os arch <<< "${target}"
            name="openhealth_${version}_${os}_${arch}"
            mkdir -p "dist/${name}"
            GOOS="${os}" GOARCH="${arch}" go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${name}/openhealth" ./cmd/openhealth
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done

          tar -czf "dist/${{ steps.meta.outputs.skill }}" -C skills/openhealth SKILL.md

      - name: Build installer
        run: |
          sed "s/__OPENHEALTH_VERSION__/${GITHUB_REF_NAME}/g" scripts/install.sh > "dist/${{ steps.meta.outputs.installer }}"
          chmod 755 "dist/${{ steps.meta.outputs.installer }}"

      - name: Build source archive and checksums
        run: |
          version="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="openhealth_${version}/" -o "dist/${{ steps.meta.outputs.archive }}" "${GITHUB_REF_NAME}"
          (
            cd dist
            shasum -a 256 *.tar.gz "${{ steps.meta.outputs.sbom }}" "${{ steps.meta.outputs.installer }}" > "${{ steps.meta.outputs.checksum }}"
          )

      - name: Prepare release notes
        id: notes
        run: |
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "${notes_file}" ]; then
            echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub Release from tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release already exists for ${GITHUB_REF_NAME}"
            if [ -n "${{ steps.notes.outputs.notes_file }}" ]; then
              gh release edit "${GITHUB_REF_NAME}" --notes-file "${{ steps.notes.outputs.notes_file }}"
            fi
          elif [ -n "${{ steps.notes.outputs.notes_file }}" ]; then
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --notes-file "${{ steps.notes.outputs.notes_file }}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --generate-notes
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/* \
            --clobber

      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: |
            dist/*

      - name: Attest SBOM
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f
        with:
          subject-path: dist/${{ steps.meta.outputs.archive }}
          sbom-path: dist/${{ steps.meta.outputs.sbom }}
